server:
  port: 8761

spring:
  application:
    name: service-discovery

# Eureka Server nao se registra em si mesmo
eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
